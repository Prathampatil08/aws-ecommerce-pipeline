name: E-Commerce Pipeline CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION:    ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME:  ${{ vars.PROJECT_NAME || 'ecommerce-pipeline' }}

jobs:
  # ──────────────────────────────────────────────
  # 1. LINT & TEST
  # ──────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r src/data_generator/requirements.txt
          pip install pytest moto boto3 pyspark

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ tests/ --select E,W,F --ignore E501

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # 2. VALIDATE CLOUDFORMATION
  # ──────────────────────────────────────────────
  validate-cfn:
    name: Validate CloudFormation
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:   ${{ secrets.AWS_ROLE_ARN }}
          aws-region:       ${{ env.AWS_REGION }}

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://infrastructure/cloudformation/main-stack.yaml

  # ──────────────────────────────────────────────
  # 3. DEPLOY (main branch only)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [test, validate-cfn]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:   ${{ secrets.AWS_ROLE_ARN }}
          aws-region:       ${{ env.AWS_REGION }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Get AWS account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Set derived variables
        run: |
          echo "SCRIPTS_BUCKET=${{ env.PROJECT_NAME }}-scripts-${{ steps.account.outputs.id }}" >> $GITHUB_ENV

      - name: Create scripts bucket (idempotent)
        run: |
          aws s3 mb s3://${{ env.SCRIPTS_BUCKET }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true

      - name: Upload Glue scripts
        run: |
          aws s3 cp src/glue/bronze_to_silver.py \
            s3://${{ env.SCRIPTS_BUCKET }}/glue/bronze_to_silver.py
          aws s3 cp src/glue/silver_to_gold.py \
            s3://${{ env.SCRIPTS_BUCKET }}/glue/silver_to_gold.py
          aws s3 cp src/step_functions/pipeline_definition.json \
            s3://${{ env.SCRIPTS_BUCKET }}/step_functions/pipeline_definition.json

      - name: Package Lambda functions
        run: |
          mkdir -p dist
          (cd src/lambda/batch_ingestion && zip -q ../../dist/batch_ingestion.zip handler.py)
          (cd src/lambda/pipeline_trigger && zip -q ../../dist/pipeline_trigger.zip handler.py)
          aws s3 cp dist/batch_ingestion.zip  s3://${{ env.SCRIPTS_BUCKET }}/lambda/batch_ingestion.zip
          aws s3 cp dist/pipeline_trigger.zip s3://${{ env.SCRIPTS_BUCKET }}/lambda/pipeline_trigger.zip

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation/main-stack.yaml \
            --stack-name ${{ env.PROJECT_NAME }}-stack \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ProjectName=${{ env.PROJECT_NAME }} \
              Environment=prod \
              GlueScriptsBucket=${{ env.SCRIPTS_BUCKET }} \
              AlertEmail=${{ secrets.ALERT_EMAIL }} \
            --no-fail-on-empty-changeset

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.PROJECT_NAME }}-batch-ingestion \
            --s3-bucket ${{ env.SCRIPTS_BUCKET }} \
            --s3-key lambda/batch_ingestion.zip \
            --region ${{ env.AWS_REGION }}

          aws lambda update-function-code \
            --function-name ${{ env.PROJECT_NAME }}-pipeline-trigger \
            --s3-bucket ${{ env.SCRIPTS_BUCKET }} \
            --s3-key lambda/pipeline_trigger.zip \
            --region ${{ env.AWS_REGION }}

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ env.PROJECT_NAME }}-stack \
            --region ${{ env.AWS_REGION }} \
            --query "Stacks[0].Outputs" \
            --output table
